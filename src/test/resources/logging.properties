# Java Util Logging (JUL) Configuration for Test Execution

# Set the logging level for the root logger
.level=INFO

# Specify the handler for logging output
handlers=java.util.logging.ConsoleHandler

# Set the logging level for the console handler
java.util.logging.ConsoleHandler.level=INFO

# Define the formatter for the console handler
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Define the format for the SimpleFormatter (only log messages will be shown)
java.util.logging.SimpleFormatter.format=%5$s%n

# Suppress Selenium DevTools CDP version warnings
org.openqa.selenium.level=OFF

# Suppress Selenium DevTools logging
org.openqa.selenium.devtools.level=OFF

# Suppress Selenium Remote logging
org.openqa.selenium.remote.level=OFF
